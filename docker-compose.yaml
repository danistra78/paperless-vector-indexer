services:
  # -------------------------------------------------------------------------
  # Indexer (One-Shot): laeuft einmal und beendet sich
  # -------------------------------------------------------------------------
  indexer:
    build: .
    image: paperless-vector-indexer
    command: python main.py
    restart: "no"
    environment:
      # --- Paperless-ngx ---
      PAPERLESS_URL: "http://paperless:8000"
      PAPERLESS_TOKEN: "DEIN_PAPERLESS_API_TOKEN"

      # --- Embedding-Service (OpenAI-kompatibel, Basis-URL ohne /v1/embeddings) ---
      EMBEDDING_URL: "http://embedding:8080"
      EMBEDDING_MODEL: "dein-embedding-modell"
      VECTOR_SIZE: "1024"

      # --- Qdrant ---
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_COLLECTION: "paperless"

      # --- Chunking ---
      CHUNK_SIZE: "800"
      CHUNK_OVERLAP: "150"

      # --- Logging ---
      LOG_LEVEL: "INFO"

  # -------------------------------------------------------------------------
  # API (optionaler Read-only-Service): laeuft dauerhaft
  # -------------------------------------------------------------------------
  api:
    build: .
    image: paperless-vector-indexer
    command: python api.py
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # --- Paperless-ngx (wird von config.py erwartet) ---
      PAPERLESS_URL: "http://paperless:8000"
      PAPERLESS_TOKEN: "DEIN_PAPERLESS_API_TOKEN"

      # --- Embedding-Service (OpenAI-kompatibel, Basis-URL ohne /v1/embeddings) ---
      EMBEDDING_URL: "http://embedding:8080"
      EMBEDDING_MODEL: "dein-embedding-modell"
      VECTOR_SIZE: "1024"

      # --- Qdrant ---
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_COLLECTION: "paperless"

      # --- Logging ---
      LOG_LEVEL: "INFO"

      # --- API-Mode ---
      API_ENABLED: "true"
      API_HOST: "0.0.0.0"
      API_PORT: "8080"
      API_KEY: ""
      SEARCH_MODE: "vector"
